<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="var(--primary)">
  <meta name="description"
    content="Thợ Đụng - Nền tảng dịch vụ gia đình tại nhà. Đặt thợ điện, nước, điện lạnh, đồ gỗ nhanh chóng.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Thợ Đụng - Home Services Platform</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-title" content="Thợ Đụng">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css?v=beTheme">
</head>

<body>

  <!-- App Container -->
  <div id="app-wrapper">
    <div id="app"></div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p class="loading-text">Đang xử lý...</p>
    </div>
  </div>

  <!-- Scripts - order matters -->
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script src="api.js?v=3"></script>
  <script src="data.js?v=3"></script>
  <script src="state.js?v=3"></script>
  <script src="utils.js?v=3"></script>
  <script src="components.js?v=3"></script>
  <script src="auth.js?v=3"></script>
  <script src="customer_screen.js?v=3"></script>
  <script src="worker.js?v=4"></script>
  <script src="router.js?v=fix5"></script>
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => { });
      });
    }
  </script>

  <style>
    /* Additional inline styles for ripple animation */
    @keyframes rippleEffect {
      to {
        transform: scale(20);
        opacity: 0;
      }
    }

    @keyframes bounceIn {
      0% {
        transform: scale(0.3);
        opacity: 0;
      }

      50% {
        transform: scale(1.1);
      }

      70% {
        transform: scale(0.9);
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes slideIn {
      from {
        transform: translateY(-20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.6;
        transform: scale(1.4);
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .fa-spin {
      animation: spin 1s linear infinite;
    }
  </style>
</body>

</html>
