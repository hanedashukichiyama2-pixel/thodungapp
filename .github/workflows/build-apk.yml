name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies and Capacitor
        run: |
          npm init -y
          npm install @capacitor/core
          npm install -D @capacitor/cli @capacitor/android

      - name: Prepare Web Directory
        run: |
          mkdir www
          rsync -av --exclude='www' --exclude='node_modules' --exclude='.git' --exclude='.github' --exclude='backend' --exclude='*.docx' ./ www/

      - name: Initialize Capacitor
        run: |
          npx cap init "Thợ Đụng" com.thodung.app --web-dir www
          npx cap add android
          npx cap sync android

      - name: Build APK
        working-directory: ./android
        run: chmod +x ./gradlew && ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Thodung-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
